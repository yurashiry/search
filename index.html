<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WR Search — от компании sonne™</title>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body.light {
            --bg-primary: #f0f2f5;
            --text-primary: #1a1a2e;
            --text-secondary: #5f6368;
            --accent: #4285f4;
            --accent-hover: #3367d6;
            --border: #dadce0;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
        }

        body.dark {
            --bg-primary: #121212;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #8ab4f8;
            --accent-hover: #aecbfa;
            --border: #3c4043;
            --card-bg: #1e1e2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --input-bg: #2d2d3d;
        }

        body.colorful {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --accent: #ffd93d;
            --accent-hover: #ffe57f;
            --border: rgba(255, 255, 255, 0.25);
            --card-bg: rgba(255, 255, 255, 0.12);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --input-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .logo-section {
            text-align: center;
            padding: 60px 0 40px;
            animation: fadeInUp 0.6s ease;
        }

        .logo {
            font-size: 68px;
            font-weight: 800;
            background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc04, #34a853);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s ease infinite;
        }

        .tagline {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 10px;
        }

        .search-container {
            margin: 0 auto 20px;
            max-width: 580px;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 60px;
            padding: 4px 4px 4px 24px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .search-wrapper:focus-within {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        #searchInput {
            flex: 1;
            padding: 16px 8px;
            font-size: 16px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            outline: none;
        }

        #searchInput::placeholder {
            color: var(--text-secondary);
        }

        #searchBtn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            margin: 4px;
        }

        #searchBtn:hover {
            transform: scale(1.05);
            background: var(--accent-hover);
        }

        .yandex-link {
            text-align: center;
            margin-bottom: 30px;
        }

        .yandex-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 40px;
            background: var(--card-bg);
        }

        .result-card {
            background: var(--card-bg);
            padding: 20px 24px;
            margin-bottom: 16px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease;
            border: 1px solid var(--border);
        }

        .result-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .custom-badge {
            background: linear-gradient(135deg, #34a853, #1e8e3e);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
        }

        .result-snippet {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .user-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            z-index: 100;
            border: 1px solid var(--border);
        }

        .user-info-display {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #ea4335);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            overflow: hidden;
        }

        .theme-bar {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .theme-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .profile-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 400px;
            height: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            padding: 24px;
            overflow-y: auto;
            border-left: 1px solid var(--border);
        }

        .profile-panel.open {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 1000;
        }

        .admin-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .close-panel-btn {
            float: right;
            background: #ea4335;
        }

        hr {
            border-color: var(--border);
            margin: 20px 0;
        }

        .verified-badge {
            color: #34a853;
            font-weight: 600;
        }

        code {
            background: var(--bg-primary);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .logo { font-size: 48px; }
            .search-wrapper { padding: 4px 4px 4px 18px; }
            #searchBtn { width: 48px; height: 48px; }
        }
    </style>
</head>
<body class="light">
    <div class="overlay" id="overlay"></div>
    
    <div class="profile-panel" id="profilePanel">
        <button class="close-panel-btn" onclick="closeProfile()">✕</button>
        <h2>👤 Мой профиль</h2>
        <div id="profileContent"></div>
    </div>

    <div class="user-bar">
        <div id="userStatus" class="user-info-display" onclick="openProfile()">
            <span>👤 Гость</span>
        </div>
        <div id="googleBtn"></div>
    </div>

    <div class="theme-bar">
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
        <button class="theme-btn" onclick="setTheme('colorful')">🌈</button>
    </div>

    <div class="container">
        <div class="logo-section">
            <div class="logo">WR Search</div>
            <div class="tagline">⚡ быстрый поиск от компании sonne™</div>
        </div>
        
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Введите запрос..." autocomplete="off">
                <button id="searchBtn">🔍</button>
            </div>
        </div>
        
        <div class="yandex-link">
            <a href="#" id="yandexSearchLink">🔎 Искать в Яндексе →</a>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        // ========== ВАШ GOOGLE CLIENT ID ==========
        const GOOGLE_CLIENT_ID = '727787416139-3nlhl4di044oils2liot2sjo1mj5iumv.apps.googleusercontent.com';

        // ========== КАСТОМНЫЕ ОТВЕТЫ ==========
        const customAnswers = {
            'веронто': { title: '📌 Компания Веронто (WeRonto)', snippet: 'Компания "WeRonto" распалась в 2026 году, сервера выключились. Сейчас не действует, работает под новым брендом: WR (от компании sonne™).' },
            'wr': { title: '📌 Компания WR', snippet: 'Созданная в Сербии компания WR — подкомпания sonne™. Услуги: WR Video, WR SRBIJA.' },
            'mike': { title: '👤 Майк (Mike)', snippet: 'Двоюродный брат создателя sonne™. Владеет телекомпанией HYPER в Алтайске.' },
            'юрий ширяев': { title: '👤 Юрий Ширяев', snippet: 'Создатель компаний: Morento, WR, sonne™. Создатель конкурса WR eVision.' },
            'sonne': { title: '📌 Компания sonne™', snippet: 'Главная IT-компания в Алтайске. Владеет WR и HAORÏK.' },
            'hyper': { title: '📌 Компания HYPER', snippet: 'Телекомпания в Алтайске. HYPER TV — главный телеканал Алтайска.' }
        };

        let currentUser = null;
        let usersDB = {};

        function loadUsersFromStorage() {
            const saved = localStorage.getItem('wr_users_db');
            if (saved) usersDB = JSON.parse(saved);
        }

        function saveUsersToStorage() {
            localStorage.setItem('wr_users_db', JSON.stringify(usersDB));
        }

        function loadCustomAnswers() {
            const saved = localStorage.getItem('wr_custom_answers');
            if (saved) Object.assign(customAnswers, JSON.parse(saved));
        }

        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('wr_theme', theme);
        }

        function loadTheme() {
            const saved = localStorage.getItem('wr_theme') || 'light';
            setTheme(saved);
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#ea4335' : '#34a853'};
                color: white;
                padding: 12px 24px;
                border-radius: 50px;
                z-index: 2000;
                animation: fadeInUp 0.3s ease;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Google Login
        function initGoogleLogin() {
            if (!GOOGLE_CLIENT_ID) {
                console.error('Google Client ID не настроен');
                return;
            }
            
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleCredential,
                auto_select: false
            });
            
            google.accounts.id.renderButton(
                document.getElementById('googleBtn'),
                { 
                    theme: 'outline', 
                    size: 'medium',
                    text: 'signin_with',
                    shape: 'pill'
                }
            );
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        }

        function handleGoogleCredential(response) {
            try {
                const payload = parseJwt(response.credential);
                currentUser = {
                    id: payload.sub,
                    name: payload.name,
                    email: payload.email,
                    picture: payload.picture,
                    role: usersDB[payload.sub]?.role || 'user',
                    verified: usersDB[payload.sub]?.verified || false,
                    bio: usersDB[payload.sub]?.bio || ''
                };
                
                if (!usersDB[currentUser.id]) {
                    usersDB[currentUser.id] = currentUser;
                    saveUsersToStorage();
                }
                
                localStorage.setItem('wr_current_user', JSON.stringify(currentUser));
                updateUserUI();
                closeProfile();
                showToast('✅ Добро пожаловать, ' + currentUser.name);
            } catch(e) {
                showToast('❌ Ошибка входа', true);
            }
        }

        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            const normalizedQuery = query.toLowerCase().trim();
            const resultsDiv = document.getElementById('results');
            
            document.getElementById('yandexSearchLink').href = `https://yandex.ru/search/?text=${encodeURIComponent(query)}`;
            document.getElementById('yandexSearchLink').target = '_blank';
            
            let found = null;
            for (const [key, value] of Object.entries(customAnswers)) {
                if (normalizedQuery.includes(key) || key.includes(normalizedQuery)) {
                    found = value;
                    break;
                }
            }
            
            resultsDiv.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div>Поиск...</div></div>`;
            
            setTimeout(() => {
                if (found) {
                    resultsDiv.innerHTML = `
                        <div class="result-card">
                            <div class="result-title">
                                ${found.title}
                                <span class="custom-badge">WR Search</span>
                            </div>
                            <div class="result-snippet">${found.snippet}</div>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="result-card">
                            <div class="result-title">🔍 Ничего не найдено</div>
                            <div class="result-snippet">По запросу «${query}» нет информации в базе WR Search.</div>
                        </div>
                    `;
                }
                
                if (currentUser) {
                    const history = JSON.parse(localStorage.getItem(`wr_history_${currentUser.id}`) || '[]');
                    history.unshift({ query, time: new Date().toISOString() });
                    if (history.length > 20) history.pop();
                    localStorage.setItem(`wr_history_${currentUser.id}`, JSON.stringify(history));
                }
            }, 300);
        }

        function updateUserUI() {
            if (currentUser) {
                const initial = currentUser.name?.charAt(0).toUpperCase() || 'U';
                document.getElementById('userStatus').innerHTML = `
                    <div class="user-avatar">
                        ${currentUser.picture ? `<img src="${currentUser.picture}" style="width:100%;height:100%;object-fit:cover;">` : initial}
                    </div>
                    <span>${currentUser.name}</span>
                `;
            } else {
                document.getElementById('userStatus').innerHTML = '<span>👤 Гость</span>';
            }
        }

        function openProfile() {
            if (!currentUser) {
                showToast('🔑 Войдите через Google');
                return;
            }
            
            const user = usersDB[currentUser.id] || currentUser;
            
            document.getElementById('profileContent').innerHTML = `
                <div style="margin: 20px 0">
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                        <div class="user-avatar" style="width: 64px; height: 64px; font-size: 28px;">
                            ${user.picture ? `<img src="${user.picture}" style="width:100%;height:100%;object-fit:cover;">` : (user.name?.charAt(0) || 'U')}
                        </div>
                        <div>
                            <h3>${user.name}</h3>
                            <div>${user.verified ? '<span class="verified-badge">✅ Верифицирован</span>' : '⭐ Не верифицирован'}</div>
                        </div>
                    </div>
                    
                    <div><strong>🆔 Уникальный ID:</strong><br>
                        <code>${user.id}</code>
                        <button onclick="copyUserId()" style="margin-top: 8px;">📋 Копировать</button>
                    </div>
                    
                    <hr>
                    
                    <div><strong>📧 Email:</strong> ${user.email || 'Не указан'}</div>
                    
                    <div style="margin: 15px 0">
                        <label>📝 Описание профиля:</label>
                        <textarea id="bioInput" rows="3">${user.bio || ''}</textarea>
                        <button onclick="updateBio()">💾 Сохранить</button>
                    </div>
                    
                    <hr>
                    
                    <div><strong>📜 История поиска:</strong></div>
                    <div id="searchHistory"></div>
                </div>
                ${user.role === 'admin' ? `
                    <div class="admin-section">
                        <h3>🔧 Админ-панель</h3>
                        <input type="text" id="newQueryKey" placeholder="Ключевое слово">
                        <input type="text" id="newQueryTitle" placeholder="Заголовок">
                        <textarea id="newQueryAnswer" rows="2" placeholder="Текст ответа..."></textarea>
                        <button onclick="addCustomAnswer()">➕ Добавить ответ</button>
                        <button onclick="viewAllCustomAnswers()">📋 Все ответы</button>
                        <div id="adminCustomList"></div>
                    </div>
                ` : ''}
                <button onclick="logout()" style="background:#ea4335; margin-top: 20px; width: 100%;">🚪 Выйти</button>
            `;
            
            // Загружаем историю
            const history = JSON.parse(localStorage.getItem(`wr_history_${currentUser.id}`) || '[]');
            document.getElementById('searchHistory').innerHTML = history.slice(0, 10).map(h => `
                <div style="padding: 8px 0; border-bottom: 1px solid var(--border);">🔍 ${h.query} <span style="font-size: 10px;">${new Date(h.time).toLocaleDateString()}</span></div>
            `).join('') || '<em>Нет истории</em>';
            
            document.getElementById('profilePanel').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }
        
        function closeProfile() {
            document.getElementById('profilePanel').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }
        
        function copyUserId() {
            if (currentUser) {
                navigator.clipboard.writeText(currentUser.id);
                showToast('✅ ID скопирован!');
            }
        }
        
        function updateBio() {
            const bio = document.getElementById('bioInput').value;
            if (currentUser) {
                if (!usersDB[currentUser.id]) usersDB[currentUser.id] = currentUser;
                usersDB[currentUser.id].bio = bio;
                saveUsersToStorage();
                showToast('✅ Описание сохранено!');
            }
        }
        
        function addCustomAnswer() {
            const key = document.getElementById('newQueryKey').value.toLowerCase().trim();
            const title = document.getElementById('newQueryTitle').value.trim();
            const answer = document.getElementById('newQueryAnswer').value.trim();
            
            if (!key || !answer) {
                showToast('Заполните поля!', true);
                return;
            }
            
            customAnswers[key] = {
                title: title || `📌 Информация по запросу "${key}"`,
                snippet: answer
            };
            localStorage.setItem('wr_custom_answers', JSON.stringify(customAnswers));
            showToast(`✅ Добавлен ответ для "${key}"`);
            document.getElementById('newQueryKey').value = '';
            document.getElementById('newQueryTitle').value = '';
            document.getElementById('newQueryAnswer').value = '';
            viewAllCustomAnswers();
        }
        
        function viewAllCustomAnswers() {
            const container = document.getElementById('adminCustomList');
            if (!container) return;
            container.innerHTML = Object.keys(customAnswers).map(k => `
                <div style="padding: 8px; border-bottom: 1px solid var(--border);">
                    <strong>${k}</strong>: ${customAnswers[k].snippet.substring(0, 50)}...
                    <button onclick="deleteCustomAnswer('${k}')" style="background:#ea4335; padding: 4px 12px;">🗑</button>
                </div>
            `).join('');
        }
        
        function deleteCustomAnswer(key) {
            if (confirm('Удалить?')) {
                delete customAnswers[key];
                localStorage.setItem('wr_custom_answers', JSON.stringify(customAnswers));
                viewAllCustomAnswers();
                showToast('Удалено!');
            }
        }
        
        function logout() {
            if (google.accounts?.id) google.accounts.id.disableAutoSelect();
            localStorage.removeItem('wr_current_user');
            currentUser = null;
            updateUserUI();
            closeProfile();
            showToast('👋 Вы вышли');
        }
        
        function checkAuth() {
            const saved = localStorage.getItem('wr_current_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUserUI();
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadUsersFromStorage();
            loadCustomAnswers();
            checkAuth();
            initGoogleLogin();
            
            document.getElementById('searchBtn').addEventListener('click', search);
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') search();
            });
            document.getElementById('overlay').addEventListener('click', closeProfile);
            
            document.getElementById('searchInput').addEventListener('input', () => {
                const query = document.getElementById('searchInput').value;
                if (query) {
                    document.getElementById('yandexSearchLink').href = `https://yandex.ru/search/?text=${encodeURIComponent(query)}`;
                }
            });
        });
    </script>
</body>
</html>
